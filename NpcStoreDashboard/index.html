<!DOCTYPE html>
<html lang="en">
<head>
    <title>Codex Arcanum</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 class="title">Codex Arcanum</h1>

    <div class="tabs">
        <button onclick="switchTab('dialogue')">NPC Dialogue</button>
        <button onclick="switchTab('stores')">Store Codex</button>
    </div>

    <div id="dialogue-tab" class="tab-content active"></div>
    <div id="stores-tab" class="tab-content"></div>

    <!-- Store Modal -->
    <div id="store-modal" class="modal hidden">
        <div class="modal-content">
            <span class="close" onclick="closeStoreModal()">×</span>
            <h2 id="store-name"></h2>
            <table id="store-items"></table>
        </div>
    </div>

    <script src="stores.js"></script>
    <script src="storeUI.js"></script>
    <script src="dialogueUI.js"></script>
    <script src="app.js"></script>
</body>
</html>
